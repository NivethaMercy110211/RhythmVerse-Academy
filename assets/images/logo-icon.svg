<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="100%" height="100%">
  <defs>
    <!-- Brand gradient: Purple -> Violet -> Accent Pink -->
    <linearGradient id="logo-grad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3B0F70" />
      <stop offset="35%" stop-color="#7A3AED" />
      <stop offset="75%" stop-color="#FF2E88" />
      <stop offset="100%" stop-color="#FF60A8" />
    </linearGradient>
  </defs>

  <g transform="translate(10, 10)">
    <!-- Crescent Outer Arc -->
    <path d="M 50,0 C 22,0 0,22 0,50 C 0,78 22,100 50,100 C 65,100 78,92 85,80 C 86,78 84,77 83,78 C 77,88 65,95 50,95 C 25,95 5,75 5,50 C 5,25 25,5 50,5 C 65,5 78,12 85,22 C 86,23 87,22 86,21 C 80,10 66,0 50,0 Z" fill="url(#logo-grad)"/>

    <!-- Stylized R integrated on the right side of the circle -->
    <path d="M 68,32 C 68,32 75,32 80,35 C 85,38 88,44 88,50 C 88,56 84,62 78,64 C 74,65 70,65 66,65 L 66,35 M 60,30 L 60,90 C 60,91 61,92 62,92 C 63,92 64,91 64,90 L 64,68 L 70,68 C 76,68 82,78 88,88 C 89,90 91,91 92,90 C 93,89 92,87 88,78 C 84,70 78,66 78,66 C 86,64 92,58 92,50 C 92,40 85,32 74,30 L 60,30 Z" fill="url(#logo-grad)"/>

    <!-- Dancer Silhouette -->
    <!-- Head -->
    <circle cx="45" cy="28" r="4.5" fill="url(#logo-grad)"/>
    <!-- Left Arm -->
    <path d="M 45,34 C 44,34 42,36 41,39 C 39,43 36,47 31,50 C 29,51 28,49 30,48 C 35,45 39,39 41,34 C 40,33 36,32 31,33 C 26,34 20,38 15,44 C 13,46 12,45 14,43 C 19,37 26,32 32,30 C 38,28 42,30 44,32 C 45,32 45,33 45,34 Z" fill="url(#logo-grad)"/>
    <!-- Right Arm -->
    <path d="M 45,34 C 47,31 52,26 58,22 C 60,21 61,23 59,25 C 54,30 49,36 46,39 Z" fill="url(#logo-grad)"/>
    <!-- Torso -->
    <path d="M 45,34 C 42,37 41,45 41,50 C 43,53 47,53 49,50 C 49,45 48,37 45,34 Z" fill="url(#logo-grad)"/>
    <!-- Tutu / Skirt -->
    <path d="M 41,50 C 34,52 28,58 26,63 C 32,61 40,58 45,58 C 50,58 58,61 64,63 C 62,58 56,52 49,50 Z" fill="url(#logo-grad)"/>
    <!-- Standing Leg -->
    <path d="M 44,58 C 44,66 43,74 41,84 C 41,85 43,85 43,84 C 45,74 46,66 46,58 Z" fill="url(#logo-grad)"/>
    <!-- Raised Leg (Attitude Position) -->
    <path d="M 46,58 C 50,64 56,69 62,69 C 63,69 63,67 61,66 C 56,64 50,60 47,58 Z" fill="url(#logo-grad)"/>

    <!-- Stars/Sparkles at top-right -->
    <path d="M 92,15 C 92,17 93,18 95,18 C 93,18 92,19 92,21 C 92,19 91,18 89,18 C 91,18 92,17 92,15 Z" fill="url(#logo-grad)"/>
    <path d="M 82,6 C 82,8 83,9 85,9 C 83,9 82,10 82,12 C 82,10 81,9 79,9 C 81,9 82,8 82,6 Z" fill="url(#logo-grad)"/>
    <path d="M 100,28 C 100,29 101,30 103,30 C 101,30 100,31 100,33 C 100,31 99,30 97,30 C 99,30 100,29 100,28 Z" fill="url(#logo-grad)"/>
  </g>
</svg>
